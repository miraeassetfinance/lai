<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT ĐẸP -->
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <title>Tính Lãi Suất Vay – Có TOPUP</title>

  <style>
    :root{
      --primary:#2563eb;
      --primary-dark:#1e40af;
      --bg:linear-gradient(135deg,#e0f2fe,#f8fafc,#e0e7ff);
      --card-grad:linear-gradient(145deg,#ffffff,#e6f0ff);
      --text:#0f172a;
      --muted:#475569;
      --radius:14px;
      --ok:#16a34a;
      --bad:#dc2626;
      --tab-bg:#e2e8f0;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Be Vietnam Pro', sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    /* MARQUEE */
    .marquee{
      width:100%;
      overflow:hidden;
      background:linear-gradient(90deg,#2563eb,#06b6d4);
      color:#fff;
      padding:14px 0;
      font-weight:700;
      font-size:16px;
    }

    .marquee-content{
      display:inline-block;
      white-space:nowrap;
      animation:marquee 15s linear infinite;
      padding-left:100%;
    }

    @keyframes marquee{
      0%{transform:translateX(0)}
      100%{transform:translateX(-100%)}
    }

    /* TAB */
    .tabbar-wrap{
      max-width:1100px;
      margin:20px auto;
      padding:0 20px;
    }

    .tabbar{
      display:flex;
      gap:12px;
      background:#fff;
      padding:12px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    .tab-btn{
      flex:1;
      padding:14px;
      border-radius:12px;
      font-weight:800;
      font-size:16px;
      border:none;
      cursor:pointer;
      background:linear-gradient(135deg,#cbd5f5,#e0f2fe);
      color:#1e293b;
      transition:0.3s;
    }

    .tab-btn.active{
      background:linear-gradient(135deg,#2563eb,#06b6d4);
      color:#fff;
      box-shadow:0 6px 18px rgba(37,99,235,.4);
      transform:scale(1.05);
    }

    /* CONTAINER */
    .container{
      max-width:1100px;
      margin:20px auto;
      padding:25px;
      background:var(--card-grad);
      border-radius:var(--radius);
      box-shadow:0 15px 40px rgba(0,0,0,.1);
    }

    h1{
      text-align:center;
      font-size:28px;
      font-weight:800;
      color:#1e3a8a;
      border-bottom:3px solid #2563eb;
      display:inline-block;
      padding-bottom:6px;
    }

    .title-wrap{text-align:center}

    .subtitle{
      text-align:center;
      color:#64748b;
      margin-bottom:20px;
      font-size:13px;
    }

    /* INPUT */
    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .grid-3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    label{
      font-weight:600;
      font-size:14px;
    }

    input,select{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #cbd5e1;
      font-size:15px;
      margin-top:6px;
    }

    input:focus{
      border-color:#2563eb;
      box-shadow:0 0 0 3px rgba(37,99,235,.2);
    }

    /* BUTTON */
    button{
      padding:12px 16px;
      border:none;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
      background:linear-gradient(135deg,#2563eb,#06b6d4);
      color:#fff;
      transition:0.2s;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(0,0,0,.2);
    }

    .ghost{
      background:#e2e8f0;
      color:#0f172a;
    }

    .secondary{
      background:linear-gradient(135deg,#0ea5e9,#22c55e);
    }

    .actions{
      margin-top:16px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    /* TABLE */
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      background:#fff;
      border-radius:10px;
      overflow:hidden;
    }

    th{
      background:#2563eb;
      color:#fff;
      font-weight:700;
    }

    th,td{
      padding:10px;
      text-align:center;
      border:1px solid #e2e8f0;
      font-size:13px;
    }

    /* PILL */
    .pill{
      background:#e0f2fe;
      padding:6px 10px;
      border-radius:999px;
      font-size:13px;
    }

    .ok{color:#16a34a;font-weight:700}
    .na{color:#dc2626;font-weight:700}

    footer{
      text-align:center;
      margin-top:20px;
      font-size:13px;
      color:#666;
    }

    .panel{display:none}
    .panel.active{display:block}

    @media(max-width:900px){
      .grid,.grid-3{grid-template-columns:1fr}
    }
  </style>
</head>

<body>

<div class="marquee">
  <div class="marquee-content">
    💸 Chào mừng đến với công cụ Tính Lãi Suất của Team Mirae Asset NGỌC TRÂN! 📞 Liên hệ Zalo: 0964307247 🚀
  </div>
</div>

<div class="tabbar-wrap">
  <div class="tabbar">
    <button class="tab-btn active" data-tab="panel-normal">TÍNH LÃI SUẤT PL</button>
    <button class="tab-btn" data-tab="panel-topup">TÍNH LÃI TOPUP</button>
  </div>
</div>

<!-- PANEL 1 -->
<div class="container panel active" id="panel-normal">
  <div class="title-wrap">
    <h1>CÔNG CỤ TÍNH LÃI SUẤT</h1>
  </div>

  <div class="grid">
    <div><label>Ngày Giải Ngân</label><input type="date" id="disbursalDate"></div>
    <div><label>Ngày Kỳ Đóng Đầu Tiên</label><input type="date" id="firstEmiDate"></div>
    <div><label>Số Tiền Vay</label><input id="loanAmount"></div>
    <div><label>% Bảo Hiểm</label><input id="insurancePercent" value="7.7"></div>
    <div><label>Lãi Suất</label><input id="interestRate" value="52"></div>
    <div><label>Số Tháng</label><input id="months" value="24"></div>
  </div>

  <div class="actions">
    <button id="btnCalc">TÍNH NGAY</button>
    <button class="secondary">EXCEL</button>
    <button class="ghost">PDF</button>
  </div>

  <div id="summary"></div>
</div>

<div id="result"></div>

<!-- PANEL 2 -->
<div class="container panel" id="panel-topup">
  <div class="title-wrap">
    <h1>TÍNH TOPUP</h1>
  </div>

  <div class="grid-3">
    <input id="topupCurrentEmi" placeholder="EMI hiện tại">
    <input id="topupInterestRate" value="55">
    <input id="topupGracePeriod" value="14">
    <input id="topupLoan" placeholder="Số tiền vay">
  </div>

  <div class="actions">
    <button id="btnCalcTopup">TÍNH TOPUP</button>
  </div>

  <div id="topupSummary"></div>
  <div id="topupResult"></div>
</div>

<footer>
  © 2026 - Thiết Kế Bởi Mr.Thiên
</footer>

<script>
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  }
});
</script>

</body>
</html>
